name: Docker Build (Release)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine version type
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"-beta"* || "$TAG" == *"-rc"* || "$TAG" == *"-alpha"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Docker tags
        id: docker-tags
        run: |
          TAGS="chriscurrycc/memos:${{ steps.version.outputs.tag }}"
          # latest = every release (prerelease + stable), for users who want the newest
          TAGS="${TAGS},chriscurrycc/memos:latest"
          # stable = only stable releases, for users who want reliability
          if [[ "${{ steps.version.outputs.is_prerelease }}" == "false" ]]; then
            TAGS="${TAGS},chriscurrycc/memos:stable"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-tags.outputs.tags }}
